<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        #webcam-container canvas {
            display: none;
            border-radius: 8px;
        }
        #webcam-container.active canvas {
            display: block;
        }
        #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
        }
        .terminal-window {
            width: 100%;
            max-width: 520px;
            margin: 1rem auto;
            border: 1px solid #1f2937;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-align: left;
        }
        .terminal-header {
            background: #111827;
            color: #e5e7eb;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            font-family: Consolas, Monaco, monospace;
        }
        #terminal-output {
            background: #0b1020;
            color: #86efac;
            min-height: 120px;
            max-height: 180px;
            overflow-y: auto;
            padding: 0.75rem;
            font-size: 0.95rem;
            font-family: Consolas, Monaco, monospace;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
        }
        button.stop { background: #dc2626; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>My Teachable Machine App</h1>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div class="terminal-window">
        <div class="terminal-header">prediction-terminal</div>
        <div id="terminal-output">$ Waiting for camera...</div>
    </div>

    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // REPLACE THIS with your model URL from Teachable Machine:
        const URL = "https://teachablemachine.withgoogle.com/models/5-2oyD1xs/";

        let model, webcam, labelContainer, maxPredictions;
        let terminalOutput;
        let isRunning = false;
        let backgroundUpdateTimeout = null;
        let pendingBackgroundColor = null;
        let lastTerminalCommand = "";

        function writeTerminalLine(text) {
            if (text === lastTerminalCommand) return;
            lastTerminalCommand = text;

            if (!terminalOutput) {
                terminalOutput = document.getElementById("terminal-output");
            }

            terminalOutput.innerHTML += "\n$ " + text;
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function setBackgroundColorWithDelay(color, delay = 200) {
            if (pendingBackgroundColor === color) return;

            pendingBackgroundColor = color;
            if (backgroundUpdateTimeout) {
                clearTimeout(backgroundUpdateTimeout);
            }

            backgroundUpdateTimeout = setTimeout(() => {
                document.body.style.backgroundColor = pendingBackgroundColor;
                backgroundUpdateTimeout = null;
            }, delay);
        }

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            terminalOutput = document.getElementById("terminal-output");
            terminalOutput.textContent = "$ Camera started";
            lastTerminalCommand = "Camera started";
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            isRunning = true;
            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > topClass.probability) {
                    topClass = prediction[i];
                }
            
    	    }

    if (topClass.className === "Scissor" && topClass.probability > 0.8) {
            setBackgroundColorWithDelay("PaleGreen"); // green
            writeTerminalLine("go");
    } else if (topClass.className === "Paper" && topClass.probability > 0.8) {
            setBackgroundColorWithDelay("Pink"); // red
            writeTerminalLine("stop");
    } else if (topClass.className === "Rock" && topClass.probability > 0.8){
        setBackgroundColorWithDelay("LightSkyBlue");
        writeTerminalLine("yield");
    } else {
            setBackgroundColorWithDelay("white");
            writeTerminalLine("waiting...");
    }

            // topClass.className is the winning label
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            // Update the display
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }

        async function toggleCamera() {
            const button = document.getElementById("toggleButton");
            if (!isRunning) {
                await init();
                button.textContent = "Stop Camera";
                button.classList.add("stop");
            } else {
                isRunning = false;
                webcam.stop();
                document.getElementById("webcam-container").classList.remove("active");
                writeTerminalLine("Camera stopped");
                button.textContent = "Start Camera";
                button.classList.remove("stop");
            }
        }
    </script>
</body>
</html>
